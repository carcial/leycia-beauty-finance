<!DOCTYPE html>
<html lang="fr-CA">
<head>
  <script>
    /* GitHub Pages : /repo-name sans slash final casse config.js → on fixe la base */
    (function () {
      if (!location.hostname.endsWith("github.io")) return;
      var parts = location.pathname.split("/").filter(Boolean);
      if (!parts.length) return;
      var base = document.createElement("base");
      base.href = "/" + parts[0] + "/";
      document.head.appendChild(base);
    })();
  </script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Leycia beauty — Mon activité</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div id="root"></div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js" onerror="window.__CONFIG_MISSING__=true"></script>
  <script src="js/calc-platform.js"></script>
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
